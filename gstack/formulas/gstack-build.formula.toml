description = """
gstack implementation of the Gas City build-base contract.

This formula adapts garrytan/gstack's sprint model onto Gas City:
Think -> Plan -> Build -> Review -> Test -> Ship -> Reflect.
"""
formula = "gstack-build"
version = 1
contract = "graph.v2"
extends = ["build-base"]
target_required = true

[catalog]
name = "gstack-build"
description = "Run build-base with garrytan/gstack office-hours planning, multi-lane reviews, QA, and release readiness."

[metadata.gc.methodology]
allowed_drain_policies = ["separate", "same-session"]
implementation_strategy = "drain"
interaction_modes = ["interactive", "autonomous", "headless"]
review_modes = ["report", "agent", "interactive"]

[vars]
[vars.implementation_target]
description = "gstack task implementation role."
default = "gstack.implementer"

[vars.planning_formula]
description = "gstack planning methodology formula."
default = "gstack-planning"

[vars.decomposition_formula]
description = "gstack decomposition methodology formula."
default = "gstack-decomposition"

[vars.implementation_formula]
description = "gstack implementation entry formula."
default = "gstack-implementation"

[vars.implementation_item_formula]
description = "gstack single-item implementation formula."
default = "gstack-work-item"

[vars.code_review_formula]
description = "gstack code-review methodology formula."
default = "gstack-review"

[vars.review_fix_formula]
description = "gstack review-fix methodology formula."
default = "gstack-fix-loop"

[vars.interaction_mode]
description = "Workflow interaction posture: interactive, autonomous, or headless."
default = "interactive"

[vars.review_mode]
description = "Review authority: report, agent, or interactive."
default = "interactive"

[[steps]]
id = "requirements"
title = "gstack office-hours requirements"
needs = ["prepare"]
metadata = { "gc.run_target" = "gstack.office-hours", "gc.build.artifact_schema" = "gc.build.requirements.v1", "gc.build.artifact_path_keys" = "gc.build.requirements_path,gc.var.requirements_path" }
description_file = "../assets/workflows/gstack-build/requirements.md"

[steps.check]
max_attempts = 3

[steps.check.check]
mode = "exec"
path = ".gc/scripts/checks/build-artifact-valid.sh"
timeout = "5m"

[[steps]]
id = "plan"
title = "gstack autoplan draft"
needs = ["requirements"]
metadata = { "gc.run_target" = "gstack.founder-reviewer", "gc.build.artifact_schema" = "gc.build.plan.v1", "gc.build.artifact_path_keys" = "gc.build.plan_path,gc.var.plan_path" }
description_file = "../assets/workflows/gstack-build/plan.md"

[steps.check]
max_attempts = 3

[steps.check.check]
mode = "exec"
path = ".gc/scripts/checks/build-artifact-valid.sh"
timeout = "5m"

[[steps]]
id = "plan-review"
title = "gstack plan review fanout"
needs = ["plan"]
metadata = { "gc.run_target" = "gstack.review-synthesizer" }
expand = "gstack-plan-review"
expand_vars = { implementation_target = "{{implementation_target}}", interaction_mode = "{{interaction_mode}}" }
description_file = "../assets/workflows/gstack-build/plan-review.md"

[[steps]]
id = "decompose"
title = "Create gstack implementation convoy"
needs = ["plan-review"]
metadata = { "gc.run_target" = "gstack.decomposer", "gc.build.artifact_schema" = "gc.build.decomposition.v1", "gc.build.artifact_path_keys" = "gc.build.decomposition_path,gc.var.decomposition_path" }
description_file = "../assets/workflows/gstack-build/decompose.md"

[steps.check]
max_attempts = 3

[steps.check.check]
mode = "exec"
path = ".gc/scripts/checks/build-artifact-valid.sh"
timeout = "5m"

[[steps]]
id = "implement"
title = "Drain gstack work"
needs = ["decompose"]
condition = "{{drain_policy}} == separate"
metadata = { "gc.run_target" = "{{implementation_target}}" }
description_file = "../assets/workflows/gstack-build/implement.md"

[steps.drain]
context = "separate"
formula = "gstack-work"
member_access = "exclusive"

[[steps]]
id = "implement-same-session"
title = "Drain gstack work in one shared session"
needs = ["decompose"]
condition = "{{drain_policy}} == same-session"
metadata = { "gc.run_target" = "{{implementation_target}}" }
description_file = "../assets/workflows/gstack-build/implement-same-session.md"

[steps.drain]
context = "shared"
formula = "gstack-work-item"
on_item_failure = "skip_remaining"
member_access = "exclusive"

[steps.drain.item]
single_lane = true

[[steps]]
id = "review"
title = "gstack review fanout"
needs = ["implement", "implement-same-session"]
metadata = { "gc.run_target" = "gstack.review-synthesizer", "gc.build.artifact_schema" = "gc.build.review.v1", "gc.build.artifact_path_keys" = "gc.build.review_report_path" }
expand = "gstack-code-review"
expand_vars = { implementation_target = "{{implementation_target}}", review_mode = "{{review_mode}}" }
description_file = "../assets/workflows/gstack-build/review.md"

[[steps]]
id = "finalize"
title = "Finalize gstack sprint"
needs = ["release-readiness"]
metadata = { "gc.run_target" = "gstack.release-engineer", "gc.build.artifact_schema" = "gc.build.final-report.v1", "gc.build.artifact_path_keys" = "gc.build.final_report_path" }
description_file = "../assets/workflows/gstack-build/finalize.md"

[steps.check]
max_attempts = 3

[steps.check.check]
mode = "exec"
path = ".gc/scripts/checks/build-artifact-valid.sh"
timeout = "5m"

[[steps]]
id = "publish"
title = "Optionally publish gstack sprint"
needs = ["finalize"]
metadata = { "gc.run_target" = "gc.publisher" }
description_file = "../assets/workflows/gstack-build/publish.md"

[[steps]]
id = "qa"
title = "gstack QA fanout"
needs = ["review"]
metadata = { "gc.run_target" = "gstack.qa-lead" }
expand = "gstack-qa-review"
expand_vars = { implementation_target = "{{implementation_target}}", interaction_mode = "{{interaction_mode}}" }
description_file = "../assets/workflows/gstack-build/qa.md"

[[steps]]
id = "release-readiness"
title = "gstack release readiness fanout"
needs = ["qa"]
metadata = { "gc.run_target" = "gstack.release-engineer" }
expand = "gstack-release-readiness"
expand_vars = { review_mode = "{{review_mode}}" }
description_file = "../assets/workflows/gstack-build/release-readiness.md"
