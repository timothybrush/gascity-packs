description = """
gstack code-review expansion.

This converts gstack /review, /qa evidence, /cso, and adversarial gap checks
into explicit Gas City review lanes with synthesis and fix application.
"""
formula = "gstack-code-review"
type = "expansion"
version = 1
contract = "graph.v2"

[vars]
[vars.implementation_target]
description = "gstack task implementation role used for review fixes."
default = "gstack.implementer"

[vars.review_mode]
description = "Review authority: report, agent, or interactive."
default = "interactive"

[vars.artifact_path_keys]
description = "Comma-separated artifact metadata keys accepted by the terminal review report validator."
default = "gc.build.code_review_report_path,gc.build.review_report_path,gc.var.report_path"

[[template]]
id = "{target}.setup-gstack-code-review"
title = "Prepare gstack code review"
metadata = { "gc.run_target" = "gc.run-operator" }
description_file = "../assets/workflows/gstack-code-review/{target}.setup-gstack-code-review.md"

[[template]]
id = "{target}.gstack-code-review-loop"
title = "Run gstack code review until approved"
needs = ["{target}.setup-gstack-code-review"]
metadata = { "gc.run_target" = "gc.run-operator" }
description_file = "../assets/workflows/gstack-code-review/{target}.gstack-code-review-loop.md"

[template.check]
max_attempts = 8

[template.check.check]
mode = "exec"
path = ".gc/scripts/checks/implementation-review-approved.sh"
timeout = "10m"

[[template.children]]
id = "{target}.staff-code-review"
title = "gstack review: staff engineer"
metadata = { "gc.run_target" = "gstack.staff-reviewer" }
description_file = "../assets/workflows/gstack-code-review/{target}.staff-code-review.md"

[[template.children]]
id = "{target}.qa-evidence-review"
title = "gstack review: QA evidence"
metadata = { "gc.run_target" = "gstack.qa-lead" }
description_file = "../assets/workflows/gstack-code-review/{target}.qa-evidence-review.md"

[[template.children]]
id = "{target}.security-review"
title = "gstack review: CSO security"
metadata = { "gc.run_target" = "gstack.security-officer" }
description_file = "../assets/workflows/gstack-code-review/{target}.security-review.md"

[[template.children]]
id = "{target}.gap-analysis-review"
title = "gstack review: gap analysis"
metadata = { "gc.run_target" = "gstack.staff-reviewer" }
description_file = "../assets/workflows/gstack-code-review/{target}.gap-analysis-review.md"

[[template.children]]
id = "{target}.synthesize-code-review"
title = "Synthesize gstack code review"
needs = [
  "{target}.staff-code-review",
  "{target}.qa-evidence-review",
  "{target}.security-review",
  "{target}.gap-analysis-review",
]
metadata = { "gc.run_target" = "gstack.review-synthesizer" }
description_file = "../assets/workflows/gstack-code-review/{target}.synthesize-code-review.md"

[[template.children]]
id = "{target}.apply-review-findings"
title = "Apply gstack review findings"
needs = ["{target}.synthesize-code-review"]
condition = "{{review_mode}} != report"
metadata = { "gc.run_target" = "{implementation_target}", "gc.continuation_group" = "gstack-review-fixes" }
description_file = "../assets/workflows/gstack-code-review/{target}.apply-review-findings.md"

[[template]]
id = "{target}"
title = "Finalize gstack code review"
needs = ["{target}.gstack-code-review-loop"]
metadata = { "gc.run_target" = "gc.run-operator", "gc.build.artifact_schema" = "gc.build.review.v1", "gc.build.artifact_path_keys" = "{artifact_path_keys}" }
description_file = "../assets/workflows/gstack-code-review/{target}.md"

[template.check]
max_attempts = 3

[template.check.check]
mode = "exec"
path = ".gc/scripts/checks/build-artifact-valid.sh"
timeout = "5m"
