description = """
gstack implementation of the code-review-base methodology contract.
"""
formula = "gstack-review"
version = 1
contract = "graph.v2"
extends = ["code-review-base"]
target_required = false
internal = true
mode = "report"

[vars]
[vars.implementation_target]
description = "gstack task implementation role used for review fixes."
default = "gstack.implementer"

[vars.review_mode]
description = "Review authority: report, agent, or interactive."
default = "report"

[[steps]]
id = "write-report"
title = "Run gstack review"
needs = ["validate-context"]
metadata = { "gc.run_target" = "gstack.review-synthesizer", "gc.build.artifact_schema" = "gc.build.review.v1", "gc.build.artifact_path_keys" = "gc.build.review_report_path,gc.var.report_path" }
expand = "gstack-code-review"
expand_vars = { implementation_target = "{{implementation_target}}", review_mode = "{{review_mode}}" }
description_file = "../assets/workflows/gstack-review/write-report.md"
