description = """
Blast-radius mapping — describe the impact surface of a proposed code
change without making any modifications. The output drives test-plan
decisions and surfaces architectural risk a reviewer would flag.

A coding agent (polecat or equivalent) follows the steps in order. The
agent is given a free-text `scope` describing what code will change
(symbols, files, packages), maps the surface, and writes a structured
report to `.gc/pr-pipeline/blast-radius/<key>.md`. **No code is written.**

The molecule root bead IS the control bead — run state is recorded in
its notes via `gc bd update <root-id> --notes "<key>: <value>"`.

This formula is composable: the planner (`mol-pr-start`) currently does
its own inline blast-radius analysis, but for changes that don't start
from an issue (refactors, hotfixes, exploratory deltas), `mol-pr-blast-radius`
is a standalone entry point. The two flavors share the same analysis
shape; only the trigger and integration differ.

## Contract

1. Caller slings with `--var scope=<free-text>` (and optional `--var key=<id>`)
2. Agent works through 5 sequential steps
3. Report written to `.gc/pr-pipeline/blast-radius/<key>.md`
4. Root-bead notes record `report_path:`
5. Agent exits — no implementation work happens here

## Failure Modes

| Situation | Action |
|-----------|--------|
| Repo is not a git checkout | Record cwd, close bead |
| `scope` is empty or unparseable | Record error, close bead |
| No callers found for any symbol | Note in report; not a failure |"""
formula = "mol-pr-blast-radius"
version = 1

[vars]
[vars.scope]
description = "Free-text scope description: symbols, files, or packages the change will touch (e.g. \\\"FuncXYZ in pkg/foo and the FieldBar struct field\\\")"
required = true

[vars.key]
description = "Stable identifier used as the output filename (e.g. \\\"issue-1234\\\" or \\\"refactor-foo\\\"). Defaults to a slug derived from scope."
default = ""

[[steps]]
id = "intake"
title = "Resolve scope, establish working state"
description = """
Confirm we're in a git repo and parse the scope into a list of analyzable
targets.

```bash
ROOT_ID=$(gc bd mol current --json | jq -r '.molecule_id')
REPO_ROOT=$(git rev-parse --show-toplevel 2>/dev/null) || {
    echo "Not in a git repository — cannot map blast radius."
    gc bd close "$ROOT_ID" --reason "not a git checkout"
    exit 1
}
cd "$REPO_ROOT"
```

Read `{{scope}}` and decompose into categories:

- **Symbols** (functions, methods, types) to grep across the codebase
- **Files** to inspect for sibling code, history, recent changes
- **Packages / directories** whose internal structure matters for the change
- **Config field names** to trace through reload / API / runtime paths

Determine the output key. If `{{key}}` is empty, derive a slug from scope
(lowercase, alphanumeric + dash, max 40 chars).

```bash
KEY="{{key}}"
if [ -z "$KEY" ]; then
    KEY=$(echo "{{scope}}" | tr 'A-Z' 'a-z' | tr -cs 'a-z0-9' '-' | sed 's/^-//;s/-$//' | cut -c1-40)
fi
mkdir -p .gc/pr-pipeline/blast-radius
REPORT_PATH=".gc/pr-pipeline/blast-radius/${KEY}.md"
gc bd update "$ROOT_ID" --notes "scope: {{scope}}
key: $KEY
report_path: $REPORT_PATH
status: in_progress"
```

**Exit criteria:** In repo root, scope decomposed, report path determined.
"""

[[steps]]
id = "callers"
title = "Map direct callers and historical usage"
needs = ["intake"]
description = """
For each symbol identified in intake, find:

```bash
# Direct invocation sites
grep -rn "SymbolName(" --include="*.go" --include="*.ts" --include="*.tsx" \\
                       --include="*.py" --include="*.rs" --include="*.kt" .

# All references (assignments, type usages, etc.)
git grep -n "SymbolName"

# Historical usage — how the symbol has been added, removed, or moved
git log --oneline --all -S "SymbolName" | head -30

# Test references
grep -rn "SymbolName" --include="*_test.*" --include="*.test.*" .
```

For each modified file, find:

```bash
# Recent change history on the file
git log --oneline -20 -- <file>

# Sibling files in the same directory (often share invariants)
ls "$(dirname <file>)"

# Test files that target this file
find . -name "$(basename <file> .go)_test.go" -o -name "$(basename <file> .ts).test.ts"
```

Record what you found. Any symbol with zero callers in the codebase is
worth flagging — either dead code (delete-candidate) or fresh API
(needs first-caller test).
"""

[[steps]]
id = "config-fields"
title = "Trace config field reach"
needs = ["callers"]
description = """
For any configuration struct field (or env var) the change touches:

```bash
# All read sites
git grep -n "FieldName"

# Reload paths — if reload exists, ensure changes flow through
git grep -n "reload\\|Reload" | head -20

# API surface — if a config field is exposed via REST/RPC, check both ends
git grep -n "OpenAPI\\|openapi.json" | head -10
```

Capture the **layer chain**:

- Where the field is declared (struct definition)
- Which loaders read it (init time, reload time, request time)
- Which API endpoints expose or accept it
- Which agents/sessions consume it
- Whether tests cover all read paths

A field touched in only the declaration but read across multiple loaders
is a high-blast-radius change. Note this in the report.

If no config fields are involved, write "No config field changes" and skip
to the next step.
"""

[[steps]]
id = "concurrency"
title = "Identify concurrency surfaces"
needs = ["config-fields"]
description = """
For each touched function or shared structure, identify concurrency
context. The point: any shared mutable state across goroutines or async
boundaries needs reasoning about race safety.

```bash
# Goroutine usage on the symbol's call paths
git grep -n "go FuncName\\|go func" | head -20

# Mutex / atomic usage in the touched files
grep -n "sync\\.\\|atomic\\." <touched-files>

# Channel sends/receives
grep -n "<-\\| chan " <touched-files>
```

Decide for each touched function:

- **Single-threaded** — only ever called from one goroutine. No race risk.
- **Concurrent reads, single writer** — read-only after init. Document this.
- **Concurrent reads + writes** — needs explicit synchronization. Flag for
  reviewer scrutiny.
- **Crosses an async boundary** (e.g. event handler → background worker) —
  trace lifecycle: who creates, who reads, who tears down.

For state that crosses goroutines, capture the **lifecycle**:

- Who creates it
- Who modifies it (and from which goroutine)
- Who reads it
- Who tears it down (cleanup paths on all exit branches)

Goroutine-leak risk is high when a CLI/handler path spawns a goroutine
and the handler exits before the goroutine completes. Note any such
patterns explicitly.
"""

[[steps]]
id = "produce-report"
title = "Write the blast-radius report"
needs = ["concurrency"]
description = """
Write the report to `$REPORT_PATH` using this structure:

```markdown
# Blast radius — {{scope}}

## Targets

- **Symbols**: <list>
- **Files**: <list>
- **Packages**: <list>
- **Config fields**: <list or "none">

## Direct callers

<for each symbol, list invocation sites with file:line>

<for each file, list sibling files and recent changes>

## Cross-package usage

<symbols/types/fields used across package boundaries — list package pairs>

## Config field chain

<for each config field: declaration → loaders → API → consumers → tests>

## Concurrency surface

<for each shared structure: lifecycle and synchronization story>

## Risks

- <high-blast-radius cross-cutting concern>
- <missing test coverage for a path>
- <potential race / leak / lifecycle gap>

## Recommended scope

- <minimal change>: <which call sites, which tests, which API updates>
- <expanded change> (if maintainer prefers): <what extra to fold in>
- <out of scope> (do NOT touch in this PR): <areas that look adjacent
  but aren't in the impact surface>
```

After writing, mark complete:

```bash
ROOT_ID=$(gc bd mol current --json | jq -r '.molecule_id')
gc bd update "$ROOT_ID" --notes "status: complete"
echo "[blast-radius] Complete for: {{scope}}"
echo "[blast-radius]   Path: $REPORT_PATH"
```

**Exit criteria:** Report written, root-bead notes finalized.
"""
