description = """
Outgoing-PR self-review against an 11-category scorecard. Run this
against your own PR (or current branch's draft PR) before requesting
external review. The goal: catch the structural and correctness defects
that a careful maintainer review will flag, before the maintainer has to.

Scope: `mol-pr-review` is the **outgoing**-PR self-review (review your
own PR before submitting it). The **incoming**-PR review/merge workflow
(review someone else's PR and merge it) is a separate, maintainer-side
concern, not covered by this pack.

Reviewer-side comment template: this pack ships
`templates/adoption-review-comment.md` — the canonical structure a
maintainer uses when posting the synthesis comment after adoption. Two
forms (no maintainer changes vs. maintainer fixups present) cover all
four merge paths. The template documents inputs, rendering rules,
validation gates, and a fail-stop fallback. Reviewer-side and
author-side stay aligned by sharing the 11-category scorecard with this
formula.

A coding agent (polecat or equivalent) follows the steps in order and
writes a structured scorecard to `.gc/pr-pipeline/reviews/pr-<N>.md`.

## Contract

1. Caller slings with `--var pr=<url-or-number>`
2. Agent works through 4 sequential steps
3. Scorecard report written
4. Root-bead notes record `verdict:` (block | request_changes | approve)
5. Agent exits — no fixes are applied

Apply fixes by re-iterating the development loop, not by extending this
formula.

## Failure Modes

| Situation | Action |
|-----------|--------|
| PR does not exist | gh fails; record error, close bead |
| PR has no diff | Note in report; verdict approve |
| Diff is too large to fully analyze | Note coverage, finish what fits |"""
formula = "mol-pr-review"
version = 1

[vars]
[vars.pr]
description = "PR URL (https://github.com/owner/repo/pull/N) or bare integer in current repo"
required = true

[[steps]]
id = "intake"
title = "Fetch PR metadata and diff"
description = """
Resolve the PR identifier, fetch its data, and prepare the workspace.

**Claim the root bead BEFORE any review work begins.** `gc bd update --claim`
atomically sets assignee to your session and transitions status to
`in_progress` (idempotent if already claimed by you). Without the claim,
the bead stays `OPEN/assignee=none/started=no` while review work is in
flight, and monitoring reads false stalls.

```bash
ROOT_ID=$(gc bd mol current --json | jq -r '.molecule_id')
gc bd update "$ROOT_ID" --claim
REPO_ROOT=$(git rev-parse --show-toplevel 2>/dev/null) || {
    echo "Not in a git repository — cannot review PR."
    gc bd close "$ROOT_ID" --reason "not a git checkout"
    exit 1
}
cd "$REPO_ROOT"
```

Parse `{{pr}}`:

- If `{{pr}}` matches `https://github.com/.*/pull/\\d+` → extract
  owner/repo/number
- If `{{pr}}` is a bare integer → use current repo (`gh repo view --json
  nameWithOwner -q .nameWithOwner`)

Fetch metadata:

```bash
gh pr view <N> --repo <repo> --json \\
  number,title,body,author,baseRefName,headRefName,additions,deletions,\\
  changedFiles,mergeable,url,state,labels
```

Fetch the diff:

```bash
gh pr diff <N> --repo <repo> > /tmp/pr-<N>.diff
gh pr view <N> --repo <repo> --json files --jq '.files[].path' > /tmp/pr-<N>.files
```

Prepare the report path:

```bash
mkdir -p .gc/pr-pipeline/reviews
REPORT_PATH=".gc/pr-pipeline/reviews/pr-<N>.md"
gc bd update "$ROOT_ID" --notes "pr: <N>
repo: <repo>
report_path: $REPORT_PATH
status: in_progress"
```

**Exit criteria:** PR metadata + diff captured, report path set.
"""

[[steps]]
id = "scorecard"
title = "Score across 11 categories"
needs = ["intake"]
description = """
Read the diff and score each finding under one of the 11 categories
below. Each finding has a severity: blocker, major, minor, or nit.

| # | Category | Concerns |
|---|----------|----------|
| 1 | Behavioral Correctness | Does the code do what it claims? Off-by-one, wrong predicate, swapped args, missed branches. |
| 2 | Contract & Interface Fidelity | Public API contracts, error envelopes, response shapes, type compatibility. Backwards compat. |
| 3 | Change Impact / Blast Radius | Does the diff touch more than the title implies? Are sibling call sites updated? Cross-package effects. |
| 4 | Concurrency, Ordering & State Safety | Goroutine lifecycle, mutex/atomic correctness, race windows, ordering invariants, init-vs-reload paths. |
| 5 | Error Handling & Resilience | Silent error swallow, fail-open predicates, missing retry on transient failures, error wrapping with context. |
| 6 | Security Surface | Input validation, secret handling, auth/authz checks, file-path traversal, SSRF/SQL-injection patterns. |
| 7 | Resource Lifecycle & Cleanup | File/socket/process leaks, defer ordering, subprocess termination, temp-file cleanup. |
| 8 | Release Safety | Migration safety, backwards-incompat changes, feature flags, hard-fail conversions of previously-silent paths. |
| 9 | Test Evidence Quality | Coverage of new branches, regression tests for the bug, fakes-vs-mocks discipline, env hermeticity. |
| 10 | Architectural Consistency | Matches local conventions (do/cmd split, layered deps, naming, package shape). |
| 11 | Debuggability & Operability | Log lines, error context, doc comments on new exports, observability hooks. |

**Decision policy** (apply mechanically):

- Unresolved **blocker** in categories 1-4 → verdict `block`
- Unresolved **blocker** in categories 5-8 → verdict `request_changes`
- **Major** issues in 1-8 without mitigation → verdict `request_changes`
- Purely **minor** or **nit** → verdict `approve`
- No new findings → verdict `approve`

For each category, walk the diff and ask:

- **Cat 1**: Step through the modified function with sample inputs.
  Does each branch terminate correctly? Does the predicate match the
  intent stated in the PR title/body?
- **Cat 2**: Did any exported function/type/method change shape? Any
  added required field on an existing type? New required arg?
- **Cat 3**: For each modified function, grep callers — are sibling
  call sites updated? For each modified config field, trace through
  reload + API + runtime paths.
- **Cat 4**: Any new goroutine? Any read of mutable shared state? Any
  init-vs-reload distinction violated?
- **Cat 5**: Any `_ =` discarding an error? Any safety predicate
  returning `false` (= "safe") on internal error? Any catch-and-ignore?
- **Cat 6**: Any new endpoint, file path, subprocess invocation, env
  var read, secret-shaped string?
- **Cat 7**: Any newly opened file/socket/process — is there a paired
  cleanup on every return path?
- **Cat 8**: Any change that breaks existing example configs, tutorial
  golden files, or documented behavior?
- **Cat 9**: For each new code path (early-exit, timeout, error,
  success), is there a regression test? Are tests using `t.Setenv`
  rather than `os.Setenv`?
- **Cat 10**: Does the change shape match the rest of the package?
  Any new abstraction that doesn't fit existing patterns?
- **Cat 11**: New exports have doc comments? Error messages include
  caller context? Log lines actionable?

Record each finding inline in the report under its category, with
file:line and a one-line summary. Don't extrapolate beyond what the
diff actually shows.
"""

[[steps]]
id = "recurring-themes"
title = "Pre-flag the seven recurring fixup themes"
needs = ["scorecard"]
description = """
These seven patterns recur across many merged PRs in mature codebases —
they're cheap to detect and noisy to fix after submission. For each,
walk the diff once and flag any hits as a major finding under the
appropriate category.

### Theme 1 — Test isolation / hermeticity

- `os.Setenv` instead of `t.Setenv` (Go) — leaks env to subsequent tests
- Integration helpers that inherit ambient env vars instead of pinning
- Tests that share package-level state without capture-and-restore
  (`prev := IsX(); SetX(y); t.Cleanup(func() { SetX(prev) })`)

→ Maps to Cat 9 (Test Evidence Quality) — major

### Theme 2 — Test retry / readiness probes

- Hard-coded `time.Sleep(...)` standing in for "wait for service ready"
- Network/process readiness checks that connect once and bail
- Cleanup functions that don't retry on transient EBUSY / temp-dir locks

→ Maps to Cat 9 — major

### Theme 3 — Stale-state guards

- Cache writers that don't compare incoming version/timestamp against current
- Reload paths that overwrite live state when new config is structurally
  equivalent
- Reconciler transitions that don't fence against an older clock/epoch
- API mutation paths that refresh via a different loader than reload path

→ Maps to Cat 4 (Concurrency/State) or Cat 1 (Correctness) — blocker

### Theme 4 — Fail-closed on errors

- `bool`-returning predicate used as a safety gate that returns `false`
  (= "safe") on internal error — must fail closed (return `true` or
  surface the error)
- `_ = store.Write()` discarding error returns
- Catch-and-ignore patterns
- Helpers shared across callers where error message hardcodes one
  caller's context

→ Maps to Cat 5 (Error Handling) — blocker

### Theme 5 — Bootstrap / init hardening

- `PATH` / env-list construction that doesn't strip empty entries
- Init paths that assume directories exist without `MkdirAll`
- Bootstrap that races between binary placement and first invocation
- One-time setup paths wired into reload paths

→ Maps to Cat 4 or Cat 7 — major

### Theme 6 — API contract preservation across reloads / mutations

- API mutation handlers that refresh state via a different code path
  than the reload handler (config drift)
- Stream watchers armed *after* taking the initial snapshot (race window)
- Confirmation/visibility checks that don't bound result count
- Builtin/embedded resource lists that the API surface omits

→ Maps to Cat 2 (Contract Fidelity) — major

### Theme 7 — Transient-error retry

- DB / network operations where transient conflicts are returned as fatal
- Single-attempt operations against eventually-consistent stores

→ Maps to Cat 5 — minor (often acceptable; flag if context suggests retry
needed)

For each theme, do one focused grep over the diff. Record any hits as a
finding under the mapped category in the report.
"""

[[steps]]
id = "produce-report"
title = "Write the scorecard report and verdict"
needs = ["recurring-themes"]
description = """
Write the report to `$REPORT_PATH` using this structure:

```markdown
# Outgoing-PR review — PR #<N>: <title>

**Author**: <login>
**Base** ← **Head**: `<baseRefName>` ← `<headRefName>`
**Stats**: +<additions> -<deletions> across <changedFiles> files

## Verdict

**<block | request_changes | approve>** — <one-sentence reason>

## Decision rationale

- Blockers in categories 1-4: <count>
- Blockers in categories 5-8: <count>
- Majors in any category 1-8: <count>
- Minors / nits: <count>

## Findings by category

### 1. Behavioral Correctness

<finding>: file:line — description (severity)

### 2. Contract & Interface Fidelity

<...>

(Continue through 11 categories. If a category has no findings, write
"No findings." Do NOT omit the heading.)

## Recurring themes audit

| Theme | Hits | Detail |
|-------|------|--------|
| 1. Test isolation     | <count> | <one-line> |
| 2. Test retry         | <count> | <one-line> |
| 3. Stale-state guards | <count> | <one-line> |
| 4. Fail-closed        | <count> | <one-line> |
| 5. Bootstrap init     | <count> | <one-line> |
| 6. API contract       | <count> | <one-line> |
| 7. Transient retry    | <count> | <one-line> |

## Recommended next steps

- <action>: <reason>
- <action>: <reason>
```

Compute the verdict mechanically from finding counts:

```bash
ROOT_ID=$(gc bd mol current --json | jq -r '.molecule_id')
# After writing the report, set verdict in bead notes
VERDICT="<block | request_changes | approve>"
gc bd update "$ROOT_ID" --notes "verdict: $VERDICT
status: complete"
echo "[pr-review] Review complete for PR <N>"
echo "[pr-review]   Verdict: $VERDICT"
echo "[pr-review]   Path: $REPORT_PATH"
```

**Exit criteria:** Report written, verdict recorded in bead notes.
"""
