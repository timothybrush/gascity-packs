description = """
Generic review-leg helper for planning workflows.

Use this when a coordinator wants to fan out analysis work to polecats without
feature-branch/refinery behavior. The assignment bead description contains the
actual review prompt; this formula standardizes how the worker returns results:

1. Read the bead and any referenced artifacts
2. Perform the requested analysis
3. Persist the FULL report to the bead notes
4. Mail the coordinator recorded on the bead metadata
5. Close the bead and drain the session

Review legs are analysis-only. Do not create synthetic/test beads, route new
work, assign or reassign unrelated beads, or run live mutation experiments to
"observe" behavior. The only allowed bead mutations are the formula-prescribed
updates to the review bead itself, the completion mail, and the final drain ack.
When the assignment contains a plan, checklist, or procedure, treat that text as
the subject being reviewed. Do not execute those listed steps unless the
assignment explicitly says this review leg must execute them.

This keeps review findings durable in beads instead of transient pane output
or per-worktree scratch files.
"""
formula = "mol-review-leg"

[requires]
formula_compiler = ">=2.0.0"

[[steps]]
id = "load-assignment"
title = "Read the review assignment and metadata"
description = """
Prime your environment and read the assignment bead carefully.

**1. Prime:**
```bash
gc prime
gc bd prime
```

**2. Derive the review bead from the input convoy and read it:**
```bash
CONVOY_STATUS=$(gc convoy status {{convoy_id}} --json)
WORK_BEAD_ID=$(printf '%s' "$CONVOY_STATUS" | jq -r 'if (.children | length) == 1 then .children[0].id else empty end')
if [ -z "$WORK_BEAD_ID" ]; then
  echo "mol-review-leg requires an input convoy with exactly one tracked member" >&2
  gc runtime drain-ack
  exit 1
fi
gc bd show "$WORK_BEAD_ID"
gc bd show "$WORK_BEAD_ID" --json | jq '.[0].metadata'
```

**Expected metadata:**
- `coordinator`: who should receive the completion mail
- `review_id`: stable run identifier for the planning session
- `review_phase`: prd, design, prd-align-*, or plan-review-*
- `review_leg`: the specific dimension being reviewed

The bead description is the source of truth. Follow it exactly.
Do not invent a different scope, format, or deliverable.

**Mutation boundary:** Do not create test beads, dispatch new work, assign or
reassign unrelated beads, or mutate live state just to observe behavior. If a
piece of evidence would require changing unrelated state, document that it was
not performed and continue with the existing assignment data.

If the assignment describes a plan or checklist, review the text and report on
it. Do not start cities, spawn sessions, route extra work, or perform checklist
items just because they appear in the material being reviewed.
"""

[[steps]]
id = "write-report"
title = "Perform the analysis and store the full report on the bead"
needs = ["load-assignment"]
description = """
Do the requested review work. Read every file or artifact referenced in the
assignment. Then write the FULL report into the bead notes.

Use a structured report, not a one-line summary. Preserve the substance of
your findings in the notes so the coordinator can re-read them after your
session exits.

Suggested pattern:
```bash
CONVOY_STATUS=$(gc convoy status {{convoy_id}} --json)
WORK_BEAD_ID=$(printf '%s' "$CONVOY_STATUS" | jq -r 'if (.children | length) == 1 then .children[0].id else empty end')
gc bd update "$WORK_BEAD_ID" --notes "$(cat <<'EOF'
# <report title>

## Summary
...

## Findings
...

## Recommendations
...
EOF
)"
```

If the assignment asked for a specific structure, use that exact structure.
If you discover a blocker that prevents completing the review, document the
blocker in the notes before escalating.
"""

[[steps]]
id = "notify-close"
title = "Notify the coordinator, close the bead, and drain"
needs = ["write-report"]
description = """
After the report is stored on the bead, notify the coordinator and close out.

**1. Derive the review bead and read metadata for the mail header:**
```bash
CONVOY_STATUS=$(gc convoy status {{convoy_id}} --json)
WORK_BEAD_ID=$(printf '%s' "$CONVOY_STATUS" | jq -r 'if (.children | length) == 1 then .children[0].id else empty end')
COORD=$(gc bd show "$WORK_BEAD_ID" --json | jq -r '.[0].metadata.coordinator // empty')
REVIEW_ID=$(gc bd show "$WORK_BEAD_ID" --json | jq -r '.[0].metadata.review_id // empty')
PHASE=$(gc bd show "$WORK_BEAD_ID" --json | jq -r '.[0].metadata.review_phase // empty')
LEG=$(gc bd show "$WORK_BEAD_ID" --json | jq -r '.[0].metadata.review_leg // empty')
```

**2. If `COORD` is present, mail completion:**
```bash
gc mail send "$COORD" -s "IDEA_REVIEW $REVIEW_ID $PHASE $LEG complete" -m "$(cat <<EOF
Review leg complete.

Bead: $WORK_BEAD_ID
Phase: $PHASE
Leg: $LEG

Read the bead notes for the full report.
EOF
)"
```

**3. Close the bead and drain:**
```bash
gc bd update "$WORK_BEAD_ID" --status=closed
gc runtime drain-ack
```

Do not overwrite the bead notes with a short "done" summary. The notes are the
deliverable.
"""
