metadata = { "gc.run_target" = "compound-engineering.ce-code-review-selector", "ce.review_key" = "security", "ce.review_step_suffix" = "security-review", "ce.review_artifact_name" = "security.md" }
description_file = "../assets/workflows/compound-code-review/{target}.conditional-review-gate.md"

[[template.children]]
