description_file = "../assets/workflows/compound-code-review/{target}.gap-analysis-review.md"

[[template.children]]
id = "{target}.synthesize-code-review"
title = "Synthesize Compound Engineering code review"
needs = [
  "{target}.correctness-review",
  "{target}.testing-review",
  "{target}.maintainability-review",
  "{target}.standards-review",
  "{target}.agent-native-review",
  "{target}.learnings-research",
  "{target}.security-review",
  "{target}.performance-review",
  "{target}.api-contract-review",
  "{target}.data-migration-review",
  "{target}.reliability-review",
  "{target}.adversarial-review",
  "{target}.previous-comments-review",
  "{target}.julik-frontend-races-review",
  "{target}.swift-ios-review",
  "{target}.deployment-verification",
  "{target}.gap-analysis-review",
