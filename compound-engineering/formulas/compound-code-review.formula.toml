metadata = { "gc.run_target" = "compound-engineering.ce-code-review-synthesizer" }
description_file = "../assets/workflows/compound-code-review/{target}.synthesize-code-review.md"

[[template.children]]
id = "{target}.apply-review-findings"
title = "Apply Compound Engineering review findings"
needs = ["{target}.synthesize-code-review"]
condition = "{{review_mode}} != report"
metadata = { "gc.run_target" = "{implementation_target}", "gc.continuation_group" = "compound-code-review-fixes" }
description_file = "../assets/workflows/compound-code-review/{target}.apply-review-findings.md"

[[template]]
id = "{target}"
title = "Finalize approved Compound Engineering code review"
needs = ["{target}.compound-code-review-loop"]
metadata = { "gc.run_target" = "gc.run-operator", "gc.build.artifact_schema" = "gc.build.review.v1", "gc.build.artifact_path_keys" = "{artifact_path_keys}" }
description_file = "../assets/workflows/compound-code-review/{target}.md"

[template.check]
max_attempts = 3

[template.check.check]
mode = "exec"
path = ".gc/scripts/checks/build-artifact-valid.sh"
timeout = "5m"
