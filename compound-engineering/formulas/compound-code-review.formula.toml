description = """
Compound Engineering implementation-review expansion.

This converts the ce-code-review persona roster into explicit Gas City review
lanes, including a gap-analysis lane and cheap selector gates for conditional
reviewers, with synthesis and fix application. The upstream reviewer
definitions are vendored as reference prompts; no provider-native subagents are
invoked.
"""
formula = "compound-code-review"
type = "expansion"
version = 1
contract = "graph.v2"

[vars]
[vars.implementation_target]
description = "Compound Engineering task implementation role used for the review-fix lane."
default = "compound-engineering.ce-work"

[vars.artifact_path_keys]
description = "Comma-separated artifact metadata keys accepted by the terminal review report validator."
default = "gc.build.code_review_report_path,gc.build.review_report_path,gc.var.report_path"

[vars.review_mode]
description = "Review authority: report, agent, or interactive."
default = "agent"

[[template]]
id = "{target}.setup-compound-code-review"
title = "Prepare Compound Engineering code review"
metadata = { "gc.run_target" = "gc.run-operator" }
description_file = "../assets/workflows/compound-code-review/{target}.setup-compound-code-review.md"

[[template]]
id = "{target}.select-compound-reviewers"
title = "Select Compound Engineering conditional reviewers"
needs = ["{target}.setup-compound-code-review"]
metadata = { "gc.run_target" = "compound-engineering.ce-code-review-selector" }
description_file = "../assets/workflows/compound-code-review/{target}.select-compound-reviewers.md"

[[template]]
id = "{target}.compound-code-review-loop"
title = "Run Compound Engineering code review lanes until approved"
needs = ["{target}.select-compound-reviewers"]
metadata = { "gc.run_target" = "gc.run-operator" }
description_file = "../assets/workflows/compound-code-review/{target}.compound-code-review-loop.md"

[template.check]
max_attempts = 8

[template.check.check]
mode = "exec"
path = ".gc/scripts/checks/implementation-review-approved.sh"
timeout = "10m"

[[template.children]]
id = "{target}.correctness-review"
title = "Compound code review: correctness"
metadata = { "gc.run_target" = "compound-engineering.ce-correctness-reviewer" }
description_file = "../assets/workflows/compound-code-review/{target}.correctness-review.md"

[[template.children]]
id = "{target}.testing-review"
title = "Compound code review: testing"
metadata = { "gc.run_target" = "compound-engineering.ce-testing-reviewer" }
description_file = "../assets/workflows/compound-code-review/{target}.testing-review.md"

[[template.children]]
id = "{target}.maintainability-review"
