name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: blacksmith-32vcpu-ubuntu-2404
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: slack-full/adapter/go.mod
          cache-dependency-path: |
            slack-full/cli/go.sum

      - name: Install Python test dependencies
        run: python3 -m pip install PyYAML pytest jsonschema

      - name: Validate registry
        run: python3 validate_registry.py

      - name: Run Python pack tests
        run: python3 -m pytest tests contributing/tests gascity/tests discord/tests github/tests slack-full/tests slack-channel/tests pr-pipeline/tests -q

      - name: Lint and exercise shared role prompt composition
        run: |
          go install github.com/gastownhall/gascity/cmd/gc@latest
          GC_BIN="$(go env GOPATH)/bin/gc"
          for pack in gascity gascity/roles bmad compound-engineering gstack superpowers; do
            "$GC_BIN" lint "$pack"
          done
          GC_TEST_BIN="$GC_BIN" python3 -m pytest tests/test_gc_role_prompt_integration.py -q

      - name: Run Gastown shell tests
        run: |
          for test_script in gastown/tests/test_*.sh; do
            bash "$test_script"
          done

      - name: Run root module embed tests
        run: go test .

      - name: Run Slack full adapter tests
        working-directory: slack-full/adapter
        run: go test ./...

      - name: Run Slack full CLI tests
        working-directory: slack-full/cli
        run: go test ./...

      - name: Run Slack channel adapter tests
        working-directory: slack-channel/adapter
        run: go test ./...

      - name: Run Slack mini adapter tests
        working-directory: slack-mini/adapter
        run: go test ./...

      - name: Run runtime-cloudflare module tests
        working-directory: runtime-cloudflare/runtime
        run: |
          go vet ./...
          go test ./...

      # RPP conformance gate. Non-blocking until gascity main ships the
      # Runtime Provider Protocol (the runtime-provider-packs PoC branch
      # merges) — `gc runtime check` does not exist on gascity main yet, so
      # `@latest` cannot satisfy this today. Flip continue-on-error to false
      # (and pin @<version>) once RPP lands on gascity main. The install is a
      # tool install, not a Go import, so the pack keeps zero gascity deps.
      - name: Run runtime-cloudflare RPP conformance
        working-directory: runtime-cloudflare
        continue-on-error: true
        run: |
          go install github.com/gastownhall/gascity/cmd/gc@latest
          GC_BIN="$(go env GOPATH)/bin/gc" ./conformance.sh
