description = """
Superpowers code-review expansion.

This converts requesting-code-review, verification, and receiving-code-review
into explicit Gas City review, gap-analysis, and feedback-processing lanes.
"""
formula = "superpowers-code-review"
type = "expansion"
version = 1
contract = "graph.v2"

[vars]
[vars.implementation_target]
description = "Superpowers task implementation role used for the review-fix lane."
default = "superpowers.implementer"

[vars.artifact_path_keys]
description = "Comma-separated artifact metadata keys accepted by the terminal review report validator."
default = "gc.build.code_review_report_path,gc.build.review_report_path,gc.var.report_path"

[vars.review_mode]
description = "Review authority: report, agent, or interactive."
default = "agent"

[[template]]
id = "{target}.setup-superpowers-code-review"
title = "Prepare Superpowers code review"
metadata = { "gc.run_target" = "gc.run-operator" }
description_file = "../assets/workflows/superpowers-code-review/{target}.setup-superpowers-code-review.md"

[[template]]
id = "{target}.superpowers-code-review-loop"
title = "Run Superpowers code review until approved"
needs = ["{target}.setup-superpowers-code-review"]
metadata = { "gc.run_target" = "gc.run-operator" }
description_file = "../assets/workflows/superpowers-code-review/{target}.superpowers-code-review-loop.md"

[template.check]
max_attempts = 6

[template.check.check]
mode = "exec"
path = ".gc/scripts/checks/implementation-review-approved.sh"
timeout = "10m"

[[template.children]]
id = "{target}.request-code-review"
title = "Superpowers request code review"
metadata = { "gc.run_target" = "superpowers.code-reviewer" }
description_file = "../assets/workflows/superpowers-code-review/{target}.request-code-review.md"

[[template.children]]
id = "{target}.gap-analysis-review"
title = "Superpowers gap-analysis review"
metadata = { "gc.run_target" = "superpowers.code-quality-reviewer" }
description_file = "../assets/workflows/superpowers-code-review/{target}.gap-analysis-review.md"

[[template.children]]
id = "{target}.process-code-review"
title = "Process Superpowers code review feedback"
needs = ["{target}.request-code-review", "{target}.gap-analysis-review"]
condition = "{{review_mode}} != report"
metadata = { "gc.run_target" = "{implementation_target}", "gc.continuation_group" = "superpowers-review-fixes" }
description_file = "../assets/workflows/superpowers-code-review/{target}.process-code-review.md"

[[template]]
id = "{target}"
title = "Finalize Superpowers code review"
needs = ["{target}.superpowers-code-review-loop"]
metadata = { "gc.run_target" = "gc.run-operator", "gc.build.artifact_schema" = "gc.build.review.v1", "gc.build.artifact_path_keys" = "{artifact_path_keys}" }
description_file = "../assets/workflows/superpowers-code-review/{target}.md"

[template.check]
max_attempts = 3

[template.check.check]
mode = "exec"
path = ".gc/scripts/checks/build-artifact-valid.sh"
timeout = "5m"
