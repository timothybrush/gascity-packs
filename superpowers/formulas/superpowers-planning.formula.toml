description = """
Superpowers implementation of the planning-base methodology contract.
"""
formula = "superpowers-planning"
version = 1
contract = "graph.v2"
extends = ["planning-base"]
target_required = false
internal = true

[vars]
[vars.brainstorming_approval_mode]
description = "Superpowers brainstorming approval mode: autonomous or interactive."
default = "autonomous"

[[steps]]
id = "requirements"
title = "Superpowers brainstorm requirements"
needs = ["prepare-planning"]
metadata = { "gc.run_target" = "superpowers.brainstorming", "gc.build.artifact_schema" = "gc.build.requirements.v1", "gc.build.artifact_path_keys" = "gc.build.requirements_path,gc.var.requirements_path" }
expand = "superpowers-brainstorming"
expand_vars = { brainstorming_approval_mode = "{{brainstorming_approval_mode}}" }
description_file = "../assets/workflows/superpowers-planning/requirements.md"

[[steps]]
id = "plan"
title = "Superpowers write plan"
needs = ["requirements"]
metadata = { "gc.run_target" = "superpowers.writing-plans", "gc.build.artifact_schema" = "gc.build.plan.v1", "gc.build.artifact_path_keys" = "gc.build.plan_path,gc.var.plan_path" }
description_file = "../assets/workflows/superpowers-planning/plan.md"

[steps.check]
max_attempts = 3

[steps.check.check]
mode = "exec"
path = ".gc/scripts/checks/build-artifact-valid.sh"
timeout = "5m"

[[steps]]
id = "plan-review"
title = "Superpowers plan review"
needs = ["plan"]
metadata = { "gc.run_target" = "superpowers.plan-reviewer" }
expand = "superpowers-plan-review"
description_file = "../assets/workflows/superpowers-planning/plan-review.md"
