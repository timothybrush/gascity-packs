description = """
Superpowers implementation of the code-review-base methodology contract.
"""
formula = "superpowers-review"
version = 1
contract = "graph.v2"
extends = ["code-review-base"]
target_required = false
internal = true
mode = "report"

[vars]
[vars.implementation_target]
description = "Superpowers task implementation role used for review fixes."
default = "superpowers.implementer"

[[steps]]
id = "write-report"
title = "Run Superpowers review"
needs = ["validate-context"]
metadata = { "gc.run_target" = "superpowers.code-reviewer", "gc.build.artifact_schema" = "gc.build.review.v1", "gc.build.artifact_path_keys" = "gc.build.code_review_report_path,gc.build.review_report_path,gc.var.report_path" }
expand = "superpowers-code-review"
expand_vars = { implementation_target = "{{implementation_target}}", artifact_path_keys = "gc.build.code_review_report_path,gc.build.review_report_path,gc.var.report_path" }
description_file = "../assets/workflows/superpowers-review/write-report.md"
