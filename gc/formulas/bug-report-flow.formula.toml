description = """
Default bug report investigation workflow skeleton.

This formula is a base-pack extension point for richer bug investigation
flows. The default skeleton preserves the lifecycle shape from report intake
through classification and optional implementation dispatch; local packs can
override individual steps with deeper investigation behavior.
"""
formula = "bug-report-flow"
version = 1
contract = "graph.v2"

[catalog]
name = "bug-report-flow"
description = "Investigate a bug report through intake, reproduction, classification, and optional implementation dispatch."

[vars.report_ref]
description = "GitHub issue reference."
required = true

[vars.run_mode]
description = "Execution mode: start, resume, fresh, abort, or purge."
default = "start"

[[steps]]
id = "body"
title = "Bug report body scope"
needs = ["bootstrap-run", "refresh-intake", "historical-baseline", "reported-build-repro", "main-repro", "code-path-audit", "coverage-audit", "related-refs-audit", "investigation-synthesis", "followup-evidence", "normalize-outcome", "verify-normalized-outcome", "approve-classification", "verify-classification-approval", "publish-classification", "dispatch-implementation"]
description_file = "../assets/workflows/bug-report-flow/body.md"
metadata = { "gc.kind" = "scope", "gc.scope_name" = "bug-report-flow", "gc.scope_role" = "body" }

[[steps]]
id = "bootstrap-run"
title = "Resolve report and adopt source bead"
description_file = "../assets/workflows/bug-report-flow/bootstrap-run.md"
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "setup", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.run-operator" }

[[steps]]
id = "refresh-intake"
title = "Refresh intake snapshot"
needs = ["bootstrap-run"]
description_file = "../assets/workflows/bug-report-flow/refresh-intake.md"
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.run-operator" }

[[steps]]
id = "historical-baseline"
title = "Acquire historical baseline"
needs = ["refresh-intake"]
description_file = "../assets/workflows/bug-report-flow/historical-baseline.md"
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.issue-triager" }

[[steps]]
id = "reported-build-repro"
title = "Reproduce reported build"
needs = ["historical-baseline"]
description_file = "../assets/workflows/bug-report-flow/reported-build-repro.md"
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.issue-triager" }

[[steps]]
id = "main-repro"
title = "Reproduce current main"
needs = ["refresh-intake"]
description_file = "../assets/workflows/bug-report-flow/main-repro.md"
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.issue-triager" }

[[steps]]
id = "code-path-audit"
title = "Audit code path"
needs = ["refresh-intake"]
description_file = "../assets/workflows/bug-report-flow/code-path-audit.md"
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.issue-triager" }

[[steps]]
id = "coverage-audit"
title = "Audit coverage"
needs = ["refresh-intake"]
description_file = "../assets/workflows/bug-report-flow/coverage-audit.md"
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.issue-triager" }

[[steps]]
