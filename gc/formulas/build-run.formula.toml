description = """
Durable back half for the build skill: implement, analyze gaps, review, fix,
and optionally publish.

Launch inputs:
- artifact_root: {{artifact_root}}
- context_path: {{context_path}} (empty means no extra implementation context)
- drain_policy: {{drain_policy}}
- initial_implementation_workflow_id: {{initial_implementation_workflow_id}} (empty means run initial implement)
- initial_summary_path: {{initial_summary_path}} (required when reusing an implementation)
- max_iterations: {{max_iterations}}
- push: {{push}}
- open_pr: {{open_pr}}
"""
formula = "build-run"
version = 1
contract = "graph.v2"
target_required = true
internal = true

[catalog]
name = "build-run"
description = "Run implementation, gap-analysis, review, fixes, and optional publish for an approved convoy."

[vars]
[vars.artifact_root]
description = "Build artifact root."
required = true

[vars.context_path]
description = "Implementation context bundle path."
default = ""

[vars.drain_policy]
description = "Implementation drain policy inherited by fix convoys."
default = "separate"

[vars.initial_implementation_workflow_id]
description = "Optional closed standalone implement workflow root to verify and reuse instead of rerunning initial implementation."
default = ""

[vars.initial_summary_path]
description = "Optional implementation summary path produced by the reused initial implementation workflow."
default = ""

[vars.max_iterations]
description = "Maximum attempts per gap/review loop."
default = "10"

[vars.push]
description = "Set true to allow final publish push after all loops pass."
default = "false"

[vars.open_pr]
description = "Set true to allow final PR creation after all loops pass."
default = "false"

[[steps]]
id = "implement-initial"
title = "Implement initial convoy"
metadata = { "gc.run_target" = "gc.implementation-worker" }
description_file = "../assets/workflows/build-run/implement-initial.md"

[[steps]]
id = "gap-loop"
title = "Run gap-analysis fix loop"
needs = ["implement-initial"]
metadata = { "gc.run_target" = "gc.gap-analyst" }
description_file = "../assets/workflows/build-run/gap-loop.md"

[[steps]]
id = "review-loop"
title = "Run implementation review fix loop"
needs = ["gap-loop"]
metadata = { "gc.run_target" = "gc.implementation-reviewer" }
description_file = "../assets/workflows/build-run/review-loop.md"

[[steps]]
id = "finalize"
title = "Write final report"
needs = ["review-loop"]
metadata = { "gc.run_target" = "gc.run-operator" }
description_file = "../assets/workflows/build-run/finalize.md"

[[steps]]
id = "publish"
title = "Optionally publish successful build"
needs = ["finalize"]
metadata = { "gc.run_target" = "gc.publisher" }
description_file = "../assets/workflows/build-run/publish.md"
