description = """
Default landed PR review workflow skeleton.

This formula reviews a merge range after a PR lands. Packs can override the
setup, review loop, finalization, or cleanup steps while preserving the same
workflow shape.
"""
formula = "post-merge-pr-review"
version = 1
contract = "graph.v2"

[vars]
[vars.pr_url]
description = "Original merged GitHub PR URL."
default = ""

[vars.repo_slug]
description = "GitHub owner/repo slug."
default = ""

[vars.review_base_sha]
description = "Base branch SHA immediately before the original merge."
default = ""

[vars.review_head_sha]
description = "Base branch SHA immediately after the original merge."
default = ""

[[steps]]
id = "body"
title = "Post-merge review body scope"
needs = ["setup-landed-review", "review-loop", "finalize", "cleanup-worktree"]
description_file = "../assets/workflows/post-merge-pr-review/body.md"
metadata = { "gc.kind" = "scope", "gc.scope_name" = "pr-post-merge-review", "gc.scope_role" = "body" }

[[steps]]
id = "setup-landed-review"
title = "Prepare landed review context"
description_file = "../assets/workflows/post-merge-pr-review/setup-landed-review.md"
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "setup", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.run-operator" }

[[steps]]
id = "review-loop"
title = "Review landed changes"
needs = ["setup-landed-review"]
description_file = "../assets/workflows/post-merge-pr-review/review-loop.md"
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.review-synthesizer" }

[[steps]]
id = "finalize"
title = "Publish landed review result"
needs = ["review-loop"]
description_file = "../assets/workflows/post-merge-pr-review/finalize.md"
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.publisher" }

[[steps]]
id = "cleanup-worktree"
title = "Clean up landed review worktree"
needs = ["finalize"]
description_file = "../assets/workflows/post-merge-pr-review/cleanup-worktree.md"
metadata = { "gc.kind" = "cleanup", "gc.scope_ref" = "body", "gc.scope_role" = "teardown", "gc.run_target" = "gc.run-operator" }
