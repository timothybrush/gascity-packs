description = """
Default adopt-style PR review workflow skeleton.

This formula is a customization surface for packs that want a maintainer
adoption workflow rather than the targetless `github-pr-review` comment-only
adapter. The default path is intentionally conservative and prompt-driven:
validate the PR, prepare an isolated review context, review, gate with a human,
publish the approved result, and clean up.
"""
formula = "adopt-pr-review"
version = 1
contract = "graph.v2"

[catalog]
name = "adopt-pr-review"
description = "Adopt and review a contributor PR through maintainer preflight, review, approval, publish, and cleanup."

[vars]
[vars.pr_url]
description = "Canonical full GitHub PR URL."
default = ""

[vars.repo_slug]
description = "GitHub owner/repo slug."
default = ""

[vars.pr_number]
description = "GitHub PR number."
default = ""

[vars.base_branch]
description = "Target base branch."
default = "main"

[[steps]]
id = "body"
title = "Adopt PR body scope"
needs = ["preflight", "rebase-check", "pre-review-ci", "review-loop", "pre-approval-ci", "human-approval", "finalize"]
description_file = "../assets/workflows/adopt-pr-review/body.md"
metadata = { "gc.kind" = "scope", "gc.scope_name" = "adopt-pr", "gc.scope_role" = "body" }

[[steps]]
id = "preflight"
title = "Preflight PR review"
description_file = "../assets/workflows/adopt-pr-review/preflight.md"
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "setup", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.run-operator" }

[[steps]]
id = "rebase-check"
title = "Prepare review worktree"
needs = ["preflight"]
description_file = "../assets/workflows/adopt-pr-review/rebase-check.md"
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "setup", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.implementation-worker" }

[[steps]]
id = "pre-review-ci"
title = "Run pre-review CI"
needs = ["rebase-check"]
description_file = "../assets/workflows/adopt-pr-review/pre-review-ci.md"
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.implementation-worker" }

[[steps]]
id = "review-loop"
title = "Review and refine PR"
needs = ["pre-review-ci"]
description_file = "../assets/workflows/adopt-pr-review/review-loop.md"
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.review-synthesizer" }

[[steps]]
id = "pre-approval-ci"
title = "Run pre-approval CI"
needs = ["review-loop"]
description_file = "../assets/workflows/adopt-pr-review/pre-approval-ci.md"
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.implementation-worker" }

[[steps]]
id = "human-approval"
title = "Human approval"
needs = ["pre-approval-ci"]
description_file = "../assets/workflows/adopt-pr-review/human-approval.md"
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.run-operator" }

[[steps]]
id = "finalize"
title = "Publish PR review result"
needs = ["human-approval"]
description_file = "../assets/workflows/adopt-pr-review/finalize.md"
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.publisher" }

[[steps]]
id = "cleanup-worktree"
title = "Clean up PR review worktree"
needs = ["body"]
description_file = "../assets/workflows/adopt-pr-review/cleanup-worktree.md"
metadata = { "gc.kind" = "cleanup", "gc.scope_ref" = "body", "gc.scope_role" = "teardown", "gc.run_target" = "gc.run-operator" }
