description = """
Default GitHub issue-fix design-review expansion.

This is the pack-owned training-wheels review path for an already-created
`design.md`. It runs two focused review lanes and a small synthesize/apply loop
until the design is approved. It deliberately avoids full personas or a large
issue-fix graph while preserving the `github-issue-fix.design-review` sink
contract for downstream decomposition.
"""
formula = "github-issue-fix-design-review-work"
type = "expansion"
version = 1
contract = "graph.v2"

[vars.mode]
description = "Issue-fix front-half mode, recorded in artifacts."
default = "interactive"

[[template]]
id = "{target}.setup-design-review"
title = "Prepare issue-fix design review"
metadata = { "gc.run_target" = "gc.run-operator" }
description_file = "../assets/workflows/github-issue-fix-design-review-work/{target}.setup-design-review.md"

[[template]]
id = "{target}.review-loop"
title = "Review and refine design until approved"
needs = ["{target}.setup-design-review"]
description_file = "../assets/workflows/github-issue-fix-design-review-work/{target}.review-loop.md"
metadata = { "gc.run_target" = "gc.run-operator" }

[template.ralph]
max_attempts = 8

[template.ralph.check]
mode = "exec"
path = ".gc/scripts/checks/design-review-approved.sh"
timeout = "10m"

[[template.children]]
id = "{target}.implementation-review"
title = "Review design: implementation realism"
description_file = "../assets/workflows/github-issue-fix-design-review-work/{target}.implementation-review.md"
metadata = { "gc.run_target" = "gc.design-implementation-reviewer" }

[[template.children]]
id = "{target}.testing-risk-review"
title = "Review design: tests and risk"
description_file = "../assets/workflows/github-issue-fix-design-review-work/{target}.testing-risk-review.md"
metadata = { "gc.run_target" = "gc.design-test-risk-reviewer" }

[[template.children]]
id = "{target}.synthesize-review"
title = "Synthesize design reviews"
needs = ["{target}.implementation-review", "{target}.testing-risk-review"]
description_file = "../assets/workflows/github-issue-fix-design-review-work/{target}.synthesize-review.md"
metadata = { "gc.run_target" = "gc.review-synthesizer" }

[[template.children]]
id = "{target}.apply-design-review-findings"
title = "Apply design-review findings"
needs = ["{target}.synthesize-review"]
description_file = "../assets/workflows/github-issue-fix-design-review-work/{target}.apply-design-review-findings.md"
metadata = { "gc.run_target" = "gc.review-synthesizer", "gc.continuation_group" = "design-review-fixes" }

[[template]]
id = "{target}"
title = "Finalize approved issue-fix design review"
needs = ["{target}.review-loop"]
metadata = { "gc.run_target" = "gc.run-operator" }
description_file = "../assets/workflows/github-issue-fix-design-review-work/{target}.md"
