description = """
Base targetless GitHub issue fix adapter.

This formula accepts only a full canonical GitHub issue URL. It always
invokes/reuses `github-issue-triage` first, then generates approved planning
artifacts and launches the existing generic build flow only for triage outcomes
that authorize work. It keeps one sticky issue-fix status comment and may open
or update a draft/ready PR only after implementation, gap-analysis, and review
all pass. V0 never merges.

Launch inputs:
- github_issue_url: {{github_issue_url}}
- artifact_root: {{artifact_root}} (optional override; empty resolves to the
  rig artifact root with the pack artifact helper)
- mode: {{mode}}
- pr_mode: {{pr_mode}}
- drain_policy: {{drain_policy}}
"""
formula = "github-issue-fix-base"
version = 1
contract = "graph.v2"
target_required = false

[vars]
[vars.github_issue_url]
description = "Full GitHub issue URL: https://github.com/<owner>/<repo>/issues/<number>."
required = true

[vars.artifact_root]
description = "Optional artifact root override. Empty resolves to the rig artifact root through assets/scripts/artifacts.py."
default = ""

[vars.mode]
description = "Front-half gate policy: interactive or autonomous."
default = "interactive"

[vars.pr_mode]
description = "PR publication mode: none, draft, or ready."
default = "none"

[vars.drain_policy]
description = "Implementation drain policy inherited by build-run and fix convoys."
default = "separate"

[[steps]]
id = "snapshot"
title = "Snapshot GitHub issue"
metadata = { "gc.run_target" = "gc.run-operator" }
description_file = "../assets/workflows/github-issue-fix-base/snapshot.md"

[[steps]]
id = "triage"
title = "Run or reuse issue triage"
needs = ["snapshot"]
metadata = { "gc.run_target" = "gc.issue-triager" }
description_file = "../assets/workflows/github-issue-fix-base/triage.md"

[[steps]]
id = "triage-gate"
title = "Gate fix eligibility"
needs = ["triage"]
metadata = { "gc.run_target" = "gc.run-operator" }
description_file = "../assets/workflows/github-issue-fix-base/triage-gate.md"

[[steps]]
id = "resume-or-create-run"
title = "Resume or create issue-fix run"
needs = ["triage-gate"]
metadata = { "gc.run_target" = "gc.run-operator" }
description_file = "../assets/workflows/github-issue-fix-base/resume-or-create-run.md"

[[steps]]
id = "update-status-started"
title = "Update sticky issue-fix status"
needs = ["resume-or-create-run"]
metadata = { "gc.run_target" = "gc.run-operator" }
description_file = "../assets/workflows/github-issue-fix-base/update-status-started.md"

[[steps]]
id = "generate-requirements"
title = "Generate approved requirements"
needs = ["update-status-started"]
metadata = { "gc.run_target" = "gc.requirements-planner" }
description_file = "../assets/workflows/github-issue-fix-base/generate-requirements.md"

[[steps]]
id = "design"
title = "Generate or gate design"
needs = ["generate-requirements"]
metadata = { "gc.run_target" = "gc.design-author" }
description_file = "../assets/workflows/github-issue-fix-base/design.md"

[[steps]]
id = "design-review"
title = "Review approved design"
needs = ["design"]
metadata = { "gc.run_target" = "gc.review-synthesizer" }
expand = "github-issue-fix-design-review-work"
description_file = "../assets/workflows/github-issue-fix-base/design-review.md"

[steps.expand_vars]
mode = "{{mode}}"

[[steps]]
id = "decompose"
title = "Generate or gate task convoy"
needs = ["design-review"]
metadata = { "gc.run_target" = "gc.task-decomposer" }
description_file = "../assets/workflows/github-issue-fix-base/decompose.md"

[[steps]]
id = "build"
title = "Run build quality loop"
needs = ["decompose"]
metadata = { "gc.run_target" = "gc.implementation-worker" }
description_file = "../assets/workflows/github-issue-fix-base/build.md"

[[steps]]
id = "publish-pr"
title = "Optionally publish PR"
needs = ["build"]
condition = "{{pr_mode}} != none"
metadata = { "gc.run_target" = "gc.publisher" }
description_file = "../assets/workflows/github-issue-fix-base/publish-pr.md"

[[steps]]
id = "finalize"
title = "Finalize issue-fix result"
needs = ["build", "publish-pr"]
metadata = { "gc.run_target" = "gc.run-operator" }
description_file = "../assets/workflows/github-issue-fix-base/finalize.md"
