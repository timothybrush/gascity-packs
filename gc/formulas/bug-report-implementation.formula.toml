description_file = "../assets/workflows/bug-report-implementation/wait-for-ci.md"
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.run-operator" }

[[steps]]
id = "approve-merge"
