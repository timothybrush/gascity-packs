description = """
Default bug report implementation workflow skeleton.

This formula is the implementation-side companion to `bug-report-flow`. It
starts after classification selects a fix or test-hardening path and preserves
the standard checkpoints: approve plan, review plan, implement, review code,
open PR, wait for CI, approve merge, and finalize.
"""
formula = "bug-report-implementation"
version = 1
contract = "graph.v2"

[vars.issue_bead_id]
description = "Canonical bug issue bead ID."
required = true

[vars.work_dir]
description = "Canonical worktree path."
required = true

[vars.run_id]
description = "Active bug-report run ID."
required = true

[[steps]]
id = "body"
title = "Bug report implementation body scope"
needs = ["approve-fix-plan", "approve-test-hardening-plan", "verify-selected-plan-approval", "prepare-design-review-doc", "design-review", "implement-change", "prepare-review-context", "code-review-loop", "approve-pr-open", "verify-pr-open-approval", "open-or-update-pr", "wait-for-ci", "approve-merge", "verify-merge-approval", "merge-and-finalize"]
description_file = "../assets/workflows/bug-report-implementation/body.md"
metadata = { "gc.kind" = "scope", "gc.scope_name" = "bug-report-implementation", "gc.scope_role" = "body" }

[[steps]]
id = "approve-fix-plan"
title = "Approve fix plan"
description_file = "../assets/workflows/bug-report-implementation/approve-fix-plan.md"
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "setup", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.implementation-worker" }

[[steps]]
id = "approve-test-hardening-plan"
title = "Approve test-hardening plan"
needs = ["approve-fix-plan"]
description_file = "../assets/workflows/bug-report-implementation/approve-test-hardening-plan.md"
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "setup", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.implementation-worker" }

[[steps]]
id = "verify-selected-plan-approval"
title = "Verify selected plan approval"
needs = ["approve-test-hardening-plan"]
description_file = "../assets/workflows/bug-report-implementation/verify-selected-plan-approval.md"
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.run-operator" }

[[steps]]
id = "prepare-design-review-doc"
title = "Prepare design review document"
needs = ["verify-selected-plan-approval"]
description_file = "../assets/workflows/bug-report-implementation/prepare-design-review-doc.md"
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.run-operator" }

[[steps]]
id = "design-review"
title = "Review approved plan"
needs = ["prepare-design-review-doc"]
description_file = "../assets/workflows/bug-report-implementation/design-review.md"
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.review-synthesizer" }

[[steps]]
id = "implement-change"
title = "Implement approved change"
needs = ["design-review"]
description_file = "../assets/workflows/bug-report-implementation/implement-change.md"
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.implementation-worker" }

[[steps]]
id = "prepare-review-context"
title = "Prepare implementation review context"
needs = ["implement-change"]
description_file = "../assets/workflows/bug-report-implementation/prepare-review-context.md"
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.run-operator" }

[[steps]]
id = "code-review-loop"
title = "Review and fix implementation"
needs = ["prepare-review-context"]
description_file = "../assets/workflows/bug-report-implementation/code-review-loop.md"
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.review-synthesizer" }

[[steps]]
id = "approve-pr-open"
title = "Approve PR publication"
needs = ["code-review-loop"]
description_file = "../assets/workflows/bug-report-implementation/approve-pr-open.md"
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.run-operator" }

[[steps]]
id = "verify-pr-open-approval"
title = "Verify PR-open approval"
needs = ["approve-pr-open"]
description_file = "../assets/workflows/bug-report-implementation/verify-pr-open-approval.md"
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.run-operator" }

[[steps]]
id = "open-or-update-pr"
title = "Open or update PR"
needs = ["verify-pr-open-approval"]
description_file = "../assets/workflows/bug-report-implementation/open-or-update-pr.md"
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.publisher" }

[[steps]]
id = "wait-for-ci"
