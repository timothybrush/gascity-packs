description_file = "../assets/workflows/bug-report-implementation/approve-merge.md"
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.run-operator" }

[[steps]]
id = "verify-merge-approval"
title = "Verify merge approval"
