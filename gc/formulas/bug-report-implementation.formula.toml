description_file = "../assets/workflows/bug-report-implementation/verify-merge-approval.md"
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.run-operator" }

[[steps]]
id = "merge-and-finalize"
title = "Merge and finalize"
needs = ["verify-merge-approval"]
description_file = "../assets/workflows/bug-report-implementation/merge-and-finalize.md"
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.run_target" = "gc.publisher" }
