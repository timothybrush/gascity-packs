description = """
BMAD Method implementation of the Gas City build-base contract.

This formula vendors the BMAD lifecycle skills and maps BMAD phases onto
build-base stages, with BMAD implementation readiness kept after
epics/stories so it matches the upstream workflow.
"""
formula = "bmad-build"
version = 1
contract = "graph.v2"
extends = ["build-base"]
target_required = true

[catalog]
name = "bmad-build"
description = "Run build-base with vendored BMAD PRD, architecture, epics/stories, implementation readiness, implementation, and review skills."

[metadata.gc.methodology]
allowed_drain_policies = ["separate", "same-session"]
implementation_strategy = "drain"
interaction_modes = ["interactive", "autonomous", "headless"]
review_modes = ["report", "agent", "interactive"]

[vars]
[vars.implementation_target]
description = "BMAD task implementation role."
default = "bmad.story-implementer"

[vars.planning_formula]
description = "BMAD planning methodology formula."
default = "bmad-planning"

[vars.decomposition_formula]
description = "BMAD decomposition methodology formula."
default = "bmad-decomposition"

[vars.implementation_formula]
description = "BMAD implementation entry formula."
default = "bmad-implementation"

[vars.implementation_item_formula]
description = "BMAD single-item implementation formula."
default = "bmad-story-development-item"

[vars.code_review_formula]
description = "BMAD code-review methodology formula."
default = "bmad-review"

[vars.review_fix_formula]
description = "BMAD review-fix methodology formula."
default = "bmad-fix-loop"

[[steps]]
id = "requirements"
title = "BMAD PRD requirements"
needs = ["prepare"]
metadata = { "gc.run_target" = "bmad.prd-writer", "gc.build.artifact_schema" = "gc.build.requirements.v1", "gc.build.artifact_path_keys" = "gc.build.requirements_path,gc.var.requirements_path" }
description_file = "../assets/workflows/bmad-build/requirements.md"

[steps.check]
max_attempts = 3

[steps.check.check]
mode = "exec"
path = ".gc/scripts/checks/build-artifact-valid.sh"
timeout = "5m"

[[steps]]
id = "plan"
title = "BMAD architecture plan"
needs = ["requirements"]
metadata = { "gc.run_target" = "bmad.architect", "gc.build.artifact_schema" = "gc.build.plan.v1", "gc.build.artifact_path_keys" = "gc.build.plan_path,gc.var.plan_path" }
description_file = "../assets/workflows/bmad-build/plan.md"

[steps.check]
max_attempts = 3

[steps.check.check]
mode = "exec"
path = ".gc/scripts/checks/build-artifact-valid.sh"
timeout = "5m"

[[steps]]
id = "plan-review"
title = "BMAD architecture handoff review"
needs = ["plan"]
metadata = { "gc.run_target" = "bmad.architect" }
description_file = "../assets/workflows/bmad-build/plan-review.md"

[[steps]]
id = "decompose"
title = "BMAD epics and stories"
needs = ["plan-review"]
metadata = { "gc.run_target" = "bmad.epic-story-decomposer", "gc.build.artifact_schema" = "gc.build.decomposition.v1", "gc.build.artifact_path_keys" = "gc.build.decomposition_path,gc.var.decomposition_path" }
description_file = "../assets/workflows/bmad-build/decompose.md"

[steps.check]
max_attempts = 3

[steps.check.check]
mode = "exec"
path = ".gc/scripts/checks/build-artifact-valid.sh"
timeout = "5m"

[[steps]]
id = "implementation-readiness"
title = "BMAD implementation readiness"
needs = ["decompose"]
metadata = { "gc.run_target" = "bmad.readiness-reviewer" }
description_file = "../assets/workflows/bmad-build/implementation-readiness.md"

[[steps]]
id = "implement"
title = "Drain BMAD story development"
needs = ["implementation-readiness"]
condition = "{{drain_policy}} == separate"
metadata = { "gc.run_target" = "{{implementation_target}}" }
description_file = "../assets/workflows/bmad-build/implement.md"

[steps.drain]
context = "separate"
formula = "bmad-story-development"
member_access = "exclusive"

[[steps]]
id = "implement-same-session"
title = "Drain BMAD story development in one shared session"
needs = ["implementation-readiness"]
condition = "{{drain_policy}} == same-session"
metadata = { "gc.run_target" = "{{implementation_target}}" }
description_file = "../assets/workflows/bmad-build/implement-same-session.md"

[steps.drain]
context = "shared"
formula = "bmad-story-development-item"
on_item_failure = "skip_remaining"
member_access = "exclusive"

[steps.drain.item]
single_lane = true

[[steps]]
id = "review"
title = "BMAD code review"
needs = ["implement", "implement-same-session"]
metadata = { "gc.run_target" = "bmad.bmad-review-synthesizer", "gc.build.artifact_schema" = "gc.build.review.v1", "gc.build.artifact_path_keys" = "gc.build.review_report_path" }
expand = "bmad-code-review-flow"
expand_vars = { implementation_target = "{{implementation_target}}" }
description_file = "../assets/workflows/bmad-build/review.md"
