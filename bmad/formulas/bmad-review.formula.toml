description = """
BMAD implementation of the code-review-base methodology contract.
"""
formula = "bmad-review"
version = 1
contract = "graph.v2"
extends = ["code-review-base"]
target_required = false
internal = true
mode = "report"

[vars]
[vars.implementation_target]
description = "BMAD task implementation role used for review fixes."
default = "bmad.story-implementer"

[[steps]]
id = "write-report"
title = "Run BMAD review"
needs = ["validate-context"]
metadata = { "gc.run_target" = "bmad.bmad-review-synthesizer", "gc.build.artifact_schema" = "gc.build.review.v1", "gc.build.artifact_path_keys" = "gc.build.review_report_path,gc.var.report_path" }
expand = "bmad-code-review-flow"
expand_vars = { implementation_target = "{{implementation_target}}", review_mode = "{{review_mode}}" }
description_file = "../assets/workflows/bmad-review/write-report.md"
